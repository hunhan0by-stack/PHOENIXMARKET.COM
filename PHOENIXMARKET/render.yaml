# Render Blueprint - deploy from repo root
# Set SECRET_KEY and ITEMSATIS_REDIRECT_URL in the Render Dashboard Environment tab
services:
  - type: web
    name: phoenixmarket
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ITEMSATIS_REDIRECT_URL
        sync: false
