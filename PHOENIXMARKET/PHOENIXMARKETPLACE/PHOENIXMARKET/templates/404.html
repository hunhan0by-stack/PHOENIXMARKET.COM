{% extends "base.html" %}
{% block title %}Page not found – PHOENIXMARKET{% endblock %}
{% block content %}
<section class="bg-slate-950/90">
  <div class="mx-auto max-w-xl px-4 py-24 sm:px-6 lg:px-8 text-center">
    <p class="text-xs font-semibold uppercase tracking-[0.25em] text-brandOrange">
      404
    </p>
    <h1 class="mt-2 text-3xl font-semibold tracking-tight text-slate-50 sm:text-4xl">
      We could not find that page
    </h1>
    <p class="mt-3 text-sm text-slate-400">
      The page or listing you were looking for does not exist, is no longer available,
      or has been moved.
    </p>
    <div class="mt-6 flex flex-wrap justify-center gap-3 text-xs">
      <a href="{{ url_for('index') }}" class="rounded-full bg-gradient-to-r from-brandRed to-brandOrange px-5 py-2 font-semibold text-black">
        Go to homepage
      </a>
      <a href="{{ url_for('products') }}" class="rounded-full border border-slate-700 px-5 py-2 text-slate-200 hover:border-brandOrange hover:text-brandOrange">
        Browse products
      </a>
    </div>
  </div>
</section>
{% endblock %}
