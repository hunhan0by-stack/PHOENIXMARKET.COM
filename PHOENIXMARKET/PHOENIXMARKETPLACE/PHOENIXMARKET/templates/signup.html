{% extends "base.html" %}
{% block title %}Sign Up – PHOENIXMARKET{% endblock %}
{% block content %}
<section class="bg-slate-950/90">
  <div class="mx-auto max-w-sm px-4 py-14 sm:px-6 lg:px-8">
    <p class="text-xs font-semibold uppercase tracking-[0.25em] text-brandOrange">
      Create account
    </p>
    <h1 class="mt-1 text-2xl font-semibold tracking-tight text-slate-50">
      Join PHOENIXMARKET
    </h1>
    <p class="mt-2 text-sm text-slate-400">
      Create a customer account to keep track of your orders.
    </p>

    <form method="post" class="mt-6 space-y-4">
      <div>
        <label class="block text-xs font-medium text-slate-300 mb-1">Email</label>
        <input type="email" name="email" class="w-full rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100 focus:border-brandOrange focus:outline-none" required>
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-300 mb-1">Password</label>
        <input type="password" name="password" class="w-full rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100 focus:border-brandOrange focus:outline-none" required>
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-300 mb-1">Confirm password</label>
        <input type="password" name="confirm_password" class="w-full rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100 focus:border-brandOrange focus:outline-none" required>
      </div>
      <button type="submit" class="w-full rounded-full bg-gradient-to-r from-brandRed to-brandOrange px-4 py-2.5 text-sm font-semibold text-black">
        Create account
      </button>
    </form>

    <p class="mt-4 text-[11px] text-slate-500">
      Already have an account?
      <a href="{{ url_for('signin') }}" class="text-brandOrange hover:text-amber-200">Sign in</a>
    </p>
  </div>
</section>
{% endblock %}
